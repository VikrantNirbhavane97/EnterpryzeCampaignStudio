(function () {
  const K = (key, shared) => (shared ? "shared::" : "me::") + key;
  window.storage = {
    async get(key, shared) {
      const v = localStorage.getItem(K(key, shared));
      return v === null ? null : { value: v };
    },
    async set(key, value, shared) { localStorage.setItem(K(key, shared), value); },

// ---------- Scheduling / cadence ----------
const CADENCES = [
  { label: "Weekly", days: 7 },
  { label: "Fortnightly", days: 14 },
  { label: "Every 3 weeks", days: 21 },
  { label: "Every 4 weeks", days: 28 },
];
const DAY = 24 * 60 * 60 * 1000;

function parseDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  return new Date(y, m - 1, d).getTime();
}
function startOfToday() {
  const n = new Date();
  return new Date(n.getFullYear(), n.getMonth(), n.getDate()).getTime();
}
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString("en-IE", { weekday: "short", day: "numeric", month: "short" });
}
function cadenceLabel(days) {
  const c = CADENCES.find((c) => c.days === days);
  return c ? c.label : "Every " + days + " days";
}
// ---------- THE single shared scheduling function ----------
// Cadence is always an exact number of calendar days (Fortnightly = 14, never 28).
// The schedule is purely count-based, so a missed send is never silently skipped:
//   Email N is due on       firstSendDate + (N - 1) * cadenceDays
//   The NEXT send is due on firstSendDate + (emails already sent) * cadenceDays
// A completed (sent) email advances the schedule by exactly ONE cadence interval.
// A generated-but-unsent draft fills the upcoming slot ("content ready") but does NOT
// advance the date. If the next date is in the past it is reported as `overdue` rather
// than rolled forward to a future cycle — the team still sees the date that needs action.
// `emails` may be the audience's email array, or a plain number = count of sent emails
// (used by the summary card, which doesn't load full email records).
// Returns { nextDue, daysUntil, overdue, ready, sentCount } or null (no schedule set).
function computeSchedule(audience, emails) {
  if (!audience.startDate || !audience.cadenceDays) return null;
  const start = parseDate(audience.startDate);
  const cad = audience.cadenceDays * DAY;
  const today = startOfToday();
  let sentCount, hasDraft;
  if (typeof emails === "number") {
    sentCount = emails;
    hasDraft = false;
  } else {
    const list = Array.isArray(emails) ? emails : [];
    sentCount = list.filter((e) => e.sentAt).length;
    hasDraft = list.some((e) => !e.sentAt);
  }
  const nextDue = start + sentCount * cad;
  const daysUntil = Math.round((nextDue - today) / DAY);
  return { nextDue, daysUntil, overdue: daysUntil < 0, ready: hasDraft, sentCount };
}

    await window.storage.set("sentlog", JSON.stringify(log), SHARED);

async function addToSentLog(entry) {
  const log = (await loadSentLog()) || [];
  if (!log.some((l) => l.emailId === entry.emailId)) {
    log.unshift(entry);
    await saveSentLog(log);
  }
}
async function removeFromSentLog(predicate) {
  const log = await loadSentLog();
  if (!log) return;
  const next = log.filter((l) => !predicate(l));
  if (next.length !== log.length) await saveSentLog(next);
}

// Interest level from click count.
function interest(clicks) {
  if (clicks >= 5) return { label: "High", color: "#1B7A3D", bg: "#E4F3E9", rank: 3 };
  if (clicks >= 2) return { label: "Warm", color: "#8A6D00", bg: "#FBF3D9", rank: 2 };
  return { label: "Low", color: BRAND.inkSoft, bg: BRAND.tintLight, rank: 1 };
}

// Turn spreadsheet rows (array of arrays) into contact records {name, email, clicks}.
function rowsToContacts(rows) {
  if (!rows || rows.length === 0) return [];
  const header = rows[0].map((c) => String(c || "").toLowerCase().trim());
  const idx = {
    email: header.findIndex((h) => h.includes("email")),
    clicks: header.findIndex((h) => h.includes("click")),
    name: header.findIndex((h) => h.includes("name") && !h.includes("first") && !h.includes("last") && !h.includes("company")),
    first: header.findIndex((h) => h.includes("first")),
    last: header.findIndex((h) => h.includes("last")),
    company: header.findIndex((h) => h.includes("company") || h.includes("organisation") || h.includes("organization")),
  };
  const hasHeader = idx.email >= 0 || idx.name >= 0 || idx.first >= 0 || idx.clicks >= 0;
  const dataRows = hasHeader ? rows.slice(1) : rows;
  const out = [];
  for (const r of dataRows) {
    if (!r || r.every((c) => String(c || "").trim() === "")) continue;
    let name = "", email = "", company = "", clicks = 1;
    if (hasHeader) {
      if (idx.name >= 0) name = String(r[idx.name] || "").trim();
      if (!name && (idx.first >= 0 || idx.last >= 0)) {
        name = [idx.first >= 0 ? r[idx.first] : "", idx.last >= 0 ? r[idx.last] : ""].map((x) => String(x || "").trim()).filter(Boolean).join(" ");
      }
      if (idx.email >= 0) email = String(r[idx.email] || "").trim();
      if (idx.company >= 0) company = String(r[idx.company] || "").trim();
      if (idx.clicks >= 0) {
        const n = parseInt(r[idx.clicks], 10);
        clicks = isNaN(n) ? 1 : Math.max(1, n);
      }
    } else {
      // No headers: col 0 = name; any cell that looks like an email = email; any pure number = clicks.
      name = String(r[0] || "").trim();
      for (const c of r.slice(1)) {
        const s = String(c || "").trim();
        if (!email && /\S+@\S+\.\S+/.test(s)) email = s;
        else if (/^\d+$/.test(s)) clicks = Math.max(1, parseInt(s, 10));
      }
    }
    if (!name && !email) continue;
    if (!name) name = email.split("@")[0];
    out.push({ name, email, company, clicks });
  }
  return out;
}

// Merge imported contacts into an audience's existing list: match by email (else name), add clicks.
function mergeContacts(existing, imported) {
  const list = [...existing];
  const key = (c) => (c.email ? "e:" + c.email.toLowerCase() : "n:" + c.name.toLowerCase());
  const map = new Map(list.map((c, i) => [key(c), i]));
  let added = 0, updated = 0;
  for (const imp of imported) {
    const k = key(imp);
    if (map.has(k)) {
      const i = map.get(k);
      list[i] = { ...list[i], clicks: (list[i].clicks || 0) + imp.clicks, email: list[i].email || imp.email, company: list[i].company || imp.company, updatedAt: Date.now() };
      updated++;
    } else {
      list.push({ id: "c_" + Date.now() + "_" + Math.random().toString(36).slice(2, 7), name: imp.name, email: imp.email, company: imp.company, clicks: imp.clicks, notes: [], followUpDate: null, addedAt: Date.now(), updatedAt: Date.now() });
      map.set(k, list.length - 1);
      added++;
    }
  }
  return { list, added, updated };
}

// ---------- One-time migration: merge each user's personal data into the shared workspace ----------
async function migratePersonalToShared() {
  let personal = [];
  try {
    const r = await window.storage.get("audiences", false);
    personal = r ? JSON.parse(r.value) : [];
  } catch {
    personal = [];
  }
  if (personal.length === 0) return;

  let shared = [];
  try {
    const r = await window.storage.get("audiences", true);
    shared = r ? JSON.parse(r.value) : [];
  } catch {
    shared = [];
  }

  const sharedIds = new Set(shared.map((a) => a.id));
  const toAdd = personal.filter((a) => !sharedIds.has(a.id));
  if (toAdd.length > 0) {
    await window.storage.set("audiences", JSON.stringify([...shared, ...toAdd]), true);
  }

  for (const aud of personal) {
    let personalEmails = [];
    try {
      const r = await window.storage.get("emails:" + aud.id, false);
      personalEmails = r ? JSON.parse(r.value) : [];
    } catch {
      personalEmails = [];
    }
    if (personalEmails.length === 0) continue;

    let sharedEmails = [];
    try {
      const r = await window.storage.get("emails:" + aud.id, true);
      sharedEmails = r ? JSON.parse(r.value) : [];
    } catch {
      sharedEmails = [];
    }
    const seen = new Set(sharedEmails.map((e) => e.id));
    const newOnes = personalEmails.filter((e) => !seen.has(e.id));
    if (newOnes.length > 0) {
      const merged = [...sharedEmails, ...newOnes].sort((a, b) => b.createdAt - a.createdAt);
      await window.storage.set("emails:" + aud.id, JSON.stringify(merged), true);
    }
  }

  try {
    await window.storage.delete("audiences", false);
  } catch {}
}

// ---------- One-time seed: pre-load the full audience grid (SEED_PLAN) with owners ----------
async function seedDefaultAudiences() {
  // Bump the flag (v2) whenever SEED_PLAN changes so the new audiences appear once.
  try {
    const flag = await window.storage.get("seeded", true);
    if (flag && flag.value === "v2") return;
  } catch {
    // flag missing — proceed with seeding
  }

  let shared = [];
  try {
    const r = await window.storage.get("audiences", true);
    shared = r ? JSON.parse(r.value) : [];
  } catch {
    shared = [];
  }

  const byKey = new Map(shared.map((a) => [slug(a.vertical) + "|" + slug(a.region), a]));
  let t = Date.now();
  let changed = false;
  for (const [vertical, regions] of SEED_PLAN) {
    for (const region of regions) {
      const key = slug(vertical) + "|" + slug(region);
      const owner = AUDIENCE_OWNERS[region] || "";
      const existing = byKey.get(key);
      if (existing) {
        // Backfill an owner onto an audience that was created before this seed.
        if (owner && !existing.owner) {
          existing.owner = owner;
          changed = true;
        }
        continue;
      }
      const a = {
        id: "seed_" + slug(vertical) + "_" + slug(region),
        vertical,
        region,
        description: SEED[vertical] ? SEED[vertical].who : "",
        painPoints: SEED[vertical] ? SEED[vertical].pain : "",
        owner,
        startDate: null,
        cadenceDays: null,
        createdAt: t++,
      };
      shared.push(a);
      byKey.set(key, a);
      changed = true;
    }
  }
  if (changed) {
    await window.storage.set("audiences", JSON.stringify(shared), true);
  }
  try {
    await window.storage.set("seeded", "v2", true);
  } catch {}
}

// ---------- Backup & restore: snapshot every stored key so upgrades are always safe ----------
const BACKUP_MARKER = "enterpryze-campaign-studio-backup";

// Reject if a promise never settles — the stored data bridge can hang in the published
// app, which is what left the backup button stuck on "Working…" forever.
function withTimeout(promise, ms, label) {
  return Promise.race([
    Promise.resolve(promise),
    new Promise((_, reject) =>
      setTimeout(() => reject(new Error((label || "That step") + " took too long and timed out")), ms)
    ),
  ]);
}

async function restoreFromBackup(data) {
  if (!data || data.app !== BACKUP_MARKER || !Array.isArray(data.audiences)) {
    throw new Error("That file doesn't look like a Campaign Studio backup.");
  }
  await saveAudiences(data.audiences);
  for (const a of data.audiences) {
    await saveEmails(a.id, (data.emails && data.emails[a.id]) || []);
  }
  await saveSentLog(data.sentlog || []);
  await saveCrm(data.crm || {});
  // Mark one-time seeds as done so a restore is never overwritten by fresh seeding.
  try {
    await window.storage.set("seeded", "v2", true);
    await window.storage.set("example-contact", "v1", true);
  } catch {}
}

// ---------- Claude API (via the Cloudflare Pages Function — the API key lives on the server) ----------
// The browser never sees the Anthropic key: it POSTs to /api/generate on the same domain,
// and the serverless function calls Anthropic and returns just the generated text.
async function callClaude(messages, tools, maxTokens) {
  let resp;
  try {
    resp = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages,
        tools: Array.isArray(tools) ? tools : [],
        maxTokens: maxTokens || 1000,
      }),
    });
  } catch (e) {
    // Network / DNS / offline — never a code problem the user can act on.
    throw new Error("Couldn't reach the writing service. Check your connection and try again.");
  }

  // Read once as text so a non-JSON error page can't throw.
  let data = {};
  try {
    const raw = await resp.text();
    data = raw ? JSON.parse(raw) : {};
  } catch (e) {
    data = {};
  }

  if (!resp.ok) {
    throw new Error((data && data.error) || ("The writing service returned an error (" + resp.status + "). Please try again."));
  }

  const text = data && data.text;
  if (!text) throw new Error("No response from the writing service. Please try again.");
  return String(text);
}

// Parse a labeled-sections response — far more robust than JSON for multi-paragraph email bodies.
function parseEmailSections(text) {
  const grab = (label, multiline) => {
    const re = multiline
      ? new RegExp(label + ":\\s*([\\s\\S]*?)(?=\\n(?:SUBJECT|PREVIEW|ANGLE|BODY):|$)", "i")
      : new RegExp(label + ":\\s*(.+)", "i");
    const m = text.match(re);
    return m ? m[1].trim() : "";
  };
  const subject = grab("SUBJECT");
  const preview = grab("PREVIEW");
  const angle = grab("ANGLE");
  const bodyM = text.match(/BODY:\s*([\s\S]*)$/i);
  const body = bodyM ? bodyM[1].trim() : "";
  if (!subject || !body) throw new Error("Could not read the generated email.");
  return { subject, preview, angle: angle || "general", body };
}

// Step 2: write the email, avoiding previous angles
async function writeEmail(audience, insights, previousEmails, focus) {
  const spanish = isSpanish(audience);
  const partner = isPartnerAudience(audience);
  const history = previousEmails
    .slice(0, 12)
    .map((e) => `- Subject: "${e.subject}" | Angle: ${e.angle}`)
    .join("\n");

  const brandRule = partner
    ? `- This audience works with SAP Business One, so you may reference SAP Business One naturally as part of the partner conversation. Enterpryze and Milner Browne are the brands making the offer.`
    : `- Never mention SAP or SAP Business One, or any underlying platform or technology partner. This is a strict brand rule.`;

  const prompt = `You are Emma, who writes outbound marketing emails for Enterpryze, a cloud business management platform (ERP) for small and mid-sized businesses. Enterpryze covers inventory, sales, purchasing, finance, CRM and mobile apps for teams on the move.

HARD RULES:
${brandRule}
- The email body MUST start with exactly: Hi *|FNAME|*,
- Where the reader's company is referenced, use the exact Mailchimp merge tag *|COMPANY|* (keep the stars and pipes exactly). Use it at most once in the body.
- Do NOT write a call to action, sign-off, signature or PS — those are appended automatically after your body. End your body on the last content sentence.
- Write for the decision-makers described below. Plain, direct, human. No hype words like "revolutionize", "unlock", "game-changing", "seamless".
- Body: greeting line plus 2-4 short paragraphs, 80-140 words total. Ground it in ONE specific development or pain point and connect it naturally to how Enterpryze helps. Do not cram in multiple product features.
- NEWS ACCURACY: Only reference a current development if it appears in the briefing below with a source. Never invent news. Do not mention tariffs, specific components, inflation figures or specific regulations unless they are in the briefing with a source or in the campaign focus. If nothing in the briefing fits, write from the audience's known pain points instead — that is always safe.
- Avoid overly specific examples unless they clearly apply to the whole audience.
${spanish ? "- Write the subject, preview and body in natural business Spanish. Keep the merge tags *|FNAME|* and *|COMPANY|* exactly as they are." : ""}

AUDIENCE:
- Micro-vertical: ${audience.vertical}
- Region: ${audience.region}
- Who they are: ${audience.description || "SME owners and operations managers"}
${audience.painPoints ? "- Known pain points and email guidance: " + audience.painPoints : ""}

CURRENT INDUSTRY BRIEFING (from live research today):
${insights}

${focus ? "CAMPAIGN FOCUS REQUESTED BY THE TEAM: " + focus : ""}

PREVIOUS EMAILS ALREADY SENT TO THIS AUDIENCE — you MUST take a different angle and a different hook from all of these. If a previous email used margin, move to stock, committed stock, expiry, traceability, reordering, reporting or another related pain point:
${history || "(none yet — this is the first email to this audience)"}

Respond in EXACTLY this format, with these four labels, nothing before or after:
SUBJECT: subject line, under 60 characters, no clickbait
PREVIEW: preview/preheader text, under 90 characters
ANGLE: 3-8 word label for the hook used, e.g. expiry visibility and waste
BODY:
Hi *|FNAME|*,

(the rest of the email body — short paragraphs separated by blank lines — NO CTA, NO sign-off, NO PS)`;
  const raw = await callClaude([{ role: "user", content: prompt }], null, 1500);
  const draft = parseEmailSections(raw);

  // Append the fixed CTA, signature and PS (per spec, always identical).
  const blocks = spanish ? BLOCKS_ES : BLOCKS_EN;
  draft.body = draft.body.trim() + "\n\n" + blocks.cta + "\n\n" + blocks.signature + "\n\n" + blocks.ps;
  return draft;
}

function weekFromToday() {
  const d = new Date(Date.now() + 7 * DAY);
  const p = (n) => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
}

function ContactEditor({ contact, onSave, onDelete }) {
  const [followUp, setFollowUp] = useState(contact.followUpDate || weekFromToday());
  const [note, setNote] = useState("");
  const [saved, setSaved] = useState(false);
  const [confirmRemove, setConfirmRemove] = useState(false);

  const save = async () => {
    const updated = {
      ...contact,
      followUpDate: followUp || null,
      notes: note.trim() ? [{ text: note.trim(), at: Date.now() }, ...(contact.notes || [])] : contact.notes || [],
      updatedAt: Date.now(),
    };
    await onSave(updated);
    setNote("");
    setSaved(true);
    setTimeout(() => setSaved(false), 1600);
  };

  return (
    <div style={{ marginTop: 12, borderTop: `1px solid ${BRAND.line}`, paddingTop: 12 }}>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 5 }}>Next contact</div>
          <input type="date" style={{ ...inputStyle, width: "auto" }} value={followUp} onChange={(e) => setFollowUp(e.target.value)} />
        </div>
        <div style={{ flex: "1 1 220px" }}>
          <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 5 }}>Add a note</div>
          <input style={inputStyle} placeholder="e.g. Replied asking about pricing — call Thursday" value={note} onChange={(e) => setNote(e.target.value)} />
        </div>
        <Btn small onClick={save}>{saved ? "Saved ✓" : "Save"}</Btn>
        {onDelete && (confirmRemove ? (
          <span style={{ display: "flex", gap: 6, alignItems: "center" }}>
            <span style={{ fontSize: 12, color: BRAND.ink }}>Remove?</span>
            <Btn kind="danger" small onClick={onDelete}>Yes</Btn>
            <Btn kind="ghost" small onClick={() => setConfirmRemove(false)}>No</Btn>
          </span>
        ) : (
          <Btn kind="danger" small onClick={() => setConfirmRemove(true)}>Remove contact</Btn>
        ))}
      </div>
      {(contact.notes || []).length > 0 && (
        <div style={{ marginTop: 10 }}>
          {(contact.notes || []).map((n, i) => (
            <div key={i} style={{ fontSize: 12.5, color: BRAND.ink, padding: "5px 0", borderTop: i === 0 ? "none" : `1px dotted ${BRAND.line}` }}>
              <span style={{ color: BRAND.inkSoft, fontSize: 11.5 }}>{new Date(n.at).toLocaleDateString("en-IE", { day: "numeric", month: "short" })} — </span>
              {n.text}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- Contact row ----------
function ContactRow({ contact, extra, onSave, onDelete, defaultOpen }) {
  const [open, setOpen] = useState(!!defaultOpen);
  const lvl = interest(contact.clicks || 0);
  const today = startOfToday();
  const overdue = contact.followUpDate && parseDate(contact.followUpDate) < today;
  return (
    <div style={{ borderTop: `1px solid ${BRAND.line}`, padding: "12px 16px", background: overdue ? "#FFF8F7" : "transparent" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
        <div style={{ flex: "1 1 200px", minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: BRAND.ink }}>{contact.name}</div>
          <div style={{ fontSize: 12, color: BRAND.inkSoft }}>
            {contact.email || "no email"}{contact.company ? " · " + contact.company : ""}{extra ? " · " + extra : ""}
          </div>
        </div>
        <Chip color={lvl.color} bg={lvl.bg}>{lvl.label} · {contact.clicks || 0} click{(contact.clicks || 0) === 1 ? "" : "s"}</Chip>
        {contact.followUpDate ? (
          <Chip color={overdue ? "#B3261E" : BRAND.primary} bg={overdue ? "#FBE9E7" : BRAND.tintLight}>
            {overdue ? "Overdue: " : "Follow up: "}{fmtDate(parseDate(contact.followUpDate))}
          </Chip>
        ) : (
          <span style={{ fontSize: 11.5, color: BRAND.inkSoft }}>no follow-up set</span>
        )}
        {(contact.notes || []).length > 0 && <span style={{ fontSize: 11.5, color: BRAND.inkSoft }}>{contact.notes.length} note{contact.notes.length === 1 ? "" : "s"}</span>}
        <Btn kind="ghost" small onClick={() => setOpen(!open)}>{open ? "Close" : "Open"}</Btn>
      </div>
      {open && <ContactEditor contact={contact} onSave={onSave} onDelete={onDelete} />}
    </div>
  );
}

// ---------- Engaged contacts section (per audience) ----------
function ContactsSection({ audience }) {
  const [contacts, setContacts] = useState(null);
  const [importOpen, setImportOpen] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [summary, setSummary] = useState("");
  const fileRef = useRef(null);

  useEffect(() => {
    let live = true;
    loadCrm().then((crm) => live && setContacts(crm[audience.id] || []));
    return () => (live = false);
  }, [audience.id]);

  const applyImport = async (imported) => {
    if (imported.length === 0) {
      setSummary("Nothing recognisable found — expected columns like Name, Email, Clicks.");
      return;
    }
    const crm = await loadCrm();
    const current = crm[audience.id] || [];
    const { list, added, updated } = mergeContacts(current, imported);
    crm[audience.id] = list;
    await saveCrm(crm);
    setContacts(list);
    setSummary(`Imported: ${added} new contact${added === 1 ? "" : "s"}, ${updated} updated with additional clicks.`);
    setPasteText("");
  };

  const onFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf);
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });
      await applyImport(rowsToContacts(rows));
    } catch (err) {
      console.error(err);
      setSummary("Couldn't read that file — please use .xlsx or .csv.");
    }
    e.target.value = "";
  };

  const onPaste = async () => {
    const rows = pasteText
      .split(/\r?\n/)
      .filter((l) => l.trim() !== "")
      .map((l) => (l.includes("\t") ? l.split("\t") : l.split(",")));
    await applyImport(rowsToContacts(rows));
  };

  const saveContact = async (updated) => {
    const crm = await loadCrm();
    const list = (crm[audience.id] || []).map((c) => (c.id === updated.id ? updated : c));
    crm[audience.id] = list;
    await saveCrm(crm);
    setContacts(list);
  };

  const deleteContact = async (id) => {
    const crm = await loadCrm();
    const list = (crm[audience.id] || []).filter((c) => c.id !== id);
    crm[audience.id] = list;
    await saveCrm(crm);
    setContacts(list);
  };

  const sorted = (contacts || []).slice().sort((a, b) => (b.clicks || 0) - (a.clicks || 0));

  return (
    <div style={{ marginTop: 26 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: BRAND.inkSoft }}>
          Engaged contacts — clicked an email ({(contacts || []).length})
        </div>
        <Btn kind="ghost" small onClick={() => { setImportOpen(!importOpen); setSummary(""); }}>
          {importOpen ? "Close import" : "Import clicks"}
        </Btn>
      </div>

      {importOpen && (
        <div style={{ background: BRAND.tintLight, border: `1px solid ${BRAND.line}`, borderRadius: 12, padding: 16, marginBottom: 12 }}>
          <div style={{ fontSize: 13, color: BRAND.ink, marginBottom: 10, lineHeight: 1.5 }}>
            Upload the click report (.xlsx or .csv) or paste rows copied from Excel. Columns like <strong>Name</strong> (or First/Last), <strong>Email</strong> and <strong>Clicks</strong> are detected automatically. Existing contacts (matched by email, or name if no email) get their click counts added to.
          </div>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" onChange={onFile} style={{ display: "none" }} />
            <Btn small onClick={() => fileRef.current && fileRef.current.click()}>Upload file</Btn>
            <span style={{ fontSize: 12, color: BRAND.inkSoft }}>or</span>
            <textarea style={{ ...inputStyle, flex: "1 1 260px", minHeight: 40, resize: "vertical" }} placeholder="Paste rows from Excel here" value={pasteText} onChange={(e) => setPasteText(e.target.value)} />
            <Btn kind="ghost" small onClick={onPaste} disabled={!pasteText.trim()}>Import pasted rows</Btn>
          </div>
          {summary && <div style={{ marginTop: 10, fontSize: 12.5, fontWeight: 600, color: BRAND.primary }}>{summary}</div>}
        </div>
      )}

      {contacts === null && <div style={{ fontSize: 13, color: BRAND.inkSoft }}>Loading contacts…</div>}
      {contacts !== null && contacts.length === 0 && !importOpen && (
        <div style={{ fontSize: 13.5, color: BRAND.inkSoft, background: BRAND.card, border: `1px dashed ${BRAND.line}`, borderRadius: 12, padding: 20 }}>
          No contacts yet. When a campaign goes out, import the click report from Excel and everyone who clicked will appear here, ranked by interest.
        </div>
      )}
      {contacts !== null && contacts.length > 0 && (
        <div style={{ background: BRAND.card, border: `1px solid ${BRAND.line}`, borderRadius: 14, overflow: "hidden" }}>
          <div style={{ padding: "10px 16px", fontSize: 11.5, color: BRAND.inkSoft }}>Sorted by interest (click count)</div>
          {sorted.map((c) => (
            <ContactRow key={c.id} contact={c} onSave={saveContact} onDelete={() => deleteContact(c.id)} />
          ))}
        </div>
      )}
    </div>
  );
}
// ---------- Generation progress ----------
const STAGES = [
  "Researching what's happening for this audience right now…",
  "Checking previous emails so we don't repeat an angle…",
  "Emma is writing the email…",
];

// ---------- Audience detail ----------
function AudienceView({ audience, onBack, onDeleteAudience, onUpdate }) {
  const [emails, setEmails] = useState(null);
  const [focus, setFocus] = useState("");
  const [stage, setStage] = useState(-1);
  const [error, setError] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [schedDate, setSchedDate] = useState(audience.startDate || "");
  const [schedCadence, setSchedCadence] = useState(audience.cadenceDays || 14);
  const [schedSaved, setSchedSaved] = useState(false);
  const [ownerName, setOwnerName] = useState(audience.owner || "");
  const busy = stage >= 0;

  useEffect(() => {
    let live = true;
    loadEmails(audience.id).then((e) => live && setEmails(e));
    return () => (live = false);
  }, [audience.id]);

  const generate = async () => {
    setError("");
    setStage(0);
    try {
      // Research is best-effort: if it fails, Emma writes from the audience's known pain points.
      const insights = await researchIndustry(audience).catch(
        () => "No current briefing available today — write from the audience's known pain points instead. Do not reference any news."
      );
      setStage(1);
      await new Promise((r) => setTimeout(r, 400));
      setStage(2);
      // Re-load shared history right before writing, in case a teammate just generated one.
      const latest = await loadEmails(audience.id);
      const draft = await writeEmail(audience, insights, latest, focus.trim());
      const email = {
        id: "em_" + Date.now(),
        subject: draft.subject,
        preview: draft.preview,
        body: draft.body,
        angle: draft.angle,
        createdAt: Date.now(),
      };
      const next = [email, ...latest];
      setEmails(next);
      await saveEmails(audience.id, next);
      setFocus("");
    } catch (e) {
      console.error(e);
      setError("Generation failed: " + (e.message || "unknown error") + " — please try again.");
    } finally {
      setStage(-1);
    }
  };

  const removeEmail = async (id) => {
    const next = emails.filter((e) => e.id !== id);
    setEmails(next);
    await saveEmails(audience.id, next);
    await removeFromSentLog((l) => l.emailId === id);
  };

  const markSent = async (id) => {
    const sentAt = Date.now();
    const target = emails.find((e) => e.id === id);
    const next = emails.map((e) => (e.id === id ? { ...e, sentAt } : e));
    setEmails(next);
    await saveEmails(audience.id, next);
    if (target) {
      await addToSentLog({
        emailId: id,
        audienceId: audience.id,
        vertical: audience.vertical,
        region: audience.region,
        subject: target.subject,
        angle: target.angle,
        sentAt,
      });
    }
  };

  return (
    <div>
      <button onClick={onBack} style={{ background: "none", border: "none", color: BRAND.primary, fontFamily: font, fontSize: 13, fontWeight: 600, cursor: "pointer", padding: 0, marginBottom: 14 }}>
        ← All audiences
      </button>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16, flexWrap: "wrap" }}>
        <div>
          <h2 style={{ margin: 0, fontSize: 22, color: BRAND.ink }}>{audience.vertical}</h2>
          <div style={{ marginTop: 6, display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
            <Chip>{audience.region}</Chip>
            {audience.owner && <Chip color={BRAND.secondary} bg="#FBEAF5">Owner: {audience.owner}</Chip>}
            {emails && <span style={{ fontSize: 12, color: BRAND.inkSoft }}>{emails.length} email{emails.length === 1 ? "" : "s"} generated</span>}
          </div>
          {audience.description && (
            <p style={{ margin: "10px 0 0", fontSize: 13.5, color: BRAND.inkSoft, maxWidth: 640, lineHeight: 1.55 }}>{audience.description}</p>
          )}
        </div>
        {confirmDelete ? (
          <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
            <span style={{ fontSize: 12.5, color: BRAND.ink }}>Delete this audience and its email history for the whole team?</span>
            <Btn kind="danger" small onClick={onDeleteAudience}>Yes, delete</Btn>
            <Btn kind="ghost" small onClick={() => setConfirmDelete(false)}>Cancel</Btn>
          </div>
        ) : (
          <Btn kind="danger" small onClick={() => setConfirmDelete(true)}>Delete audience</Btn>
        )}
      </div>

      {/* Schedule panel */}
      <div style={{ marginTop: 22, background: BRAND.card, border: `1px solid ${BRAND.line}`, borderRadius: 14, padding: 20 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: BRAND.primary, marginBottom: 10 }}>Owner & send schedule</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 5 }}>Owner</div>
            <input style={{ ...inputStyle, width: 140 }} placeholder="e.g. Vik" value={ownerName} onChange={(e) => { setOwnerName(e.target.value); setSchedSaved(false); }} />
          </div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 5 }}>First send date</div>
            <input type="date" style={{ ...inputStyle, width: "auto" }} value={schedDate} onChange={(e) => { setSchedDate(e.target.value); setSchedSaved(false); }} />
          </div>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700, marginBottom: 5 }}>Cadence</div>
            <select style={{ ...inputStyle, width: "auto" }} value={schedCadence} onChange={(e) => { setSchedCadence(Number(e.target.value)); setSchedSaved(false); }}>
              {CADENCES.map((c) => (
                <option key={c.days} value={c.days}>{c.label}</option>
              ))}
            </select>
          </div>
          <Btn
            small
            onClick={async () => {
              await onUpdate({ ...audience, owner: ownerName.trim(), startDate: schedDate || null, cadenceDays: schedDate ? schedCadence : null });
              setSchedSaved(true);
              setTimeout(() => setSchedSaved(false), 1800);
            }}
          >
            {schedSaved ? "Saved ✓" : "Save"}
          </Btn>
          {audience.startDate && (
            <Btn kind="ghost" small onClick={async () => { setSchedDate(""); await onUpdate({ ...audience, startDate: null, cadenceDays: null }); }}>
              Remove schedule
            </Btn>
          )}
        </div>
        {audience.startDate && audience.cadenceDays && emails && (() => {
          const s = computeSchedule(audience, emails);
          return s ? (
            <div style={{ marginTop: 12, fontSize: 13, color: BRAND.inkSoft }}>
              {s.overdue ? "Was due: " : "Next send: "}
              <strong style={{ color: s.overdue ? "#B3261E" : BRAND.ink }}>{fmtDate(s.nextDue)}</strong>
              {" · "}{cadenceLabel(audience.cadenceDays)}
              {" · "}
              {s.overdue ? (
                <span style={{ color: "#B3261E", fontWeight: 600 }}>overdue{s.ready ? " — draft ready to send" : " — needs content"}</span>
              ) : s.ready ? (
                <span style={{ color: "#1B7A3D", fontWeight: 600 }}>content ready</span>
              ) : (
                <span style={{ color: "#B3261E", fontWeight: 600 }}>needs content</span>
              )}
            </div>
          ) : null;
        })()}
      </div>

      {/* Generate panel */}
      <div style={{ marginTop: 22, background: BRAND.tintLight, border: `1px solid ${BRAND.line}`, borderRadius: 14, padding: 20 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: BRAND.primary, marginBottom: 10 }}>
          Generate a new email from Emma
        </div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <input
            style={{ ...inputStyle, flex: "1 1 280px" }}
            placeholder="Optional focus, e.g. 'lead with stock accuracy' — include a source if citing news"
            value={focus}
            onChange={(e) => setFocus(e.target.value)}
            disabled={busy}
          />
          <Btn kind="accent" onClick={generate} disabled={busy || emails === null}>
            {busy ? "Working…" : "Generate email"}
          </Btn>
        </div>
        {busy && (
          <div style={{ marginTop: 14 }}>
            {STAGES.map((s, i) => (
              <div key={s} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 13, padding: "3px 0", color: i <= stage ? BRAND.ink : BRAND.inkSoft, opacity: i <= stage ? 1 : 0.45 }}>
                <span style={{ width: 8, height: 8, borderRadius: 999, background: i < stage ? BRAND.primary : i === stage ? BRAND.accent : BRAND.line, flexShrink: 0 }} />
                {s}
              </div>
            ))}
          </div>
        )}
        {error && <div style={{ marginTop: 12, fontSize: 13, color: "#B3261E" }}>{error}</div>}
        <div style={{ marginTop: 12, fontSize: 11.5, color: BRAND.inkSoft }}>
          Emails use Mailchimp merge tags (*|FNAME|*, *|COMPANY|*) and automatically include the standard CTA, signature and PS. Emma checks the whole team's previous emails to this audience before choosing an angle.
        </div>
      </div>

      {/* Engaged contacts */}
      <ContactsSection audience={audience} />

      {/* History */}
      <div style={{ marginTop: 26 }}>
        <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", color: BRAND.inkSoft, marginBottom: 12 }}>
          Email history — angles already used
        </div>
        {emails === null && <div style={{ fontSize: 13, color: BRAND.inkSoft }}>Loading…</div>}
        {emails && emails.length === 0 && (
          <div style={{ fontSize: 13.5, color: BRAND.inkSoft, background: BRAND.card, border: `1px dashed ${BRAND.line}`, borderRadius: 12, padding: 20 }}>
            No emails yet for this audience. Generate the first one above — every email after it will automatically take a different angle.
          </div>
        )}
        {emails && emails.map((e) => <EmailCard key={e.id} email={e} onDelete={() => removeEmail(e.id)} onMarkSent={() => markSent(e.id)} />)}
      </div>
    </div>
  );
}

// ---------- Planning board (flight board) ----------
function PlanningBoard({ audiences, onOpen }) {
  const [rows, setRows] = useState(null);

  useEffect(() => {
    let live = true;
    (async () => {
      const scheduled = audiences.filter((a) => a.startDate && a.cadenceDays);
      const out = (
        await Promise.all(
          scheduled.map(async (a) => {
            const emails = await loadEmails(a.id);
            const s = computeSchedule(a, emails);
            return s ? { audience: a, ...s } : null;
          })
        )
      ).filter(Boolean);
      out.sort((x, y) => x.nextDue - y.nextDue || x.audience.vertical.localeCompare(y.audience.vertical));
      if (live) setRows(out);
    })();
    return () => (live = false);
  }, [audiences]);

  const unscheduled = audiences.filter((a) => !a.startDate || !a.cadenceDays);

  const statusChip = (r) => {
    if (r.ready) return <Chip color="#1B7A3D" bg="#E4F3E9">Content ready</Chip>;
    if (r.overdue) return <Chip color="#B3261E" bg="#FBE9E7">Overdue — needs content</Chip>;
    if (r.daysUntil <= 3) return <Chip color="#B3261E" bg="#FBE9E7">Needs content</Chip>;
    return <Chip color="#8A6D00" bg="#FBF3D9">Needs content</Chip>;
  };
  const dueLabel = (r) => {
    if (r.overdue) return Math.abs(r.daysUntil) === 1 ? "1 day overdue" : Math.abs(r.daysUntil) + " days overdue";
    if (r.daysUntil === 0) return "Today";
    if (r.daysUntil === 1) return "Tomorrow";
    return "in " + r.daysUntil + " days";
  };

  return (
    <div>
      <h2 style={{ margin: "0 0 4px", fontSize: 22, color: BRAND.ink }}>Planning board</h2>
      <p style={{ margin: "0 0 20px", fontSize: 13.5, color: BRAND.inkSoft, maxWidth: 640, lineHeight: 1.55 }}>
        Every scheduled audience, sorted by next send. "Content ready" means an email has been generated in the current cycle; "Needs content" means it's time to generate one.
      </p>

      {rows === null && <div style={{ fontSize: 13, color: BRAND.inkSoft }}>Loading the board…</div>}

      {rows !== null && rows.length === 0 && (
        <div style={{ fontSize: 13.5, color: BRAND.inkSoft, background: BRAND.card, border: `1px dashed ${BRAND.line}`, borderRadius: 12, padding: 20 }}>
          No audiences have a schedule yet. Open an audience and set a first send date and cadence — it will appear here automatically.
        </div>
      )}

      {rows !== null && rows.length > 0 && (
        <div style={{ background: BRAND.card, border: `1px solid ${BRAND.line}`, borderRadius: 14, overflow: "hidden" }}>
          {rows.map((r, i) => (
            <div
              key={r.audience.id}
              style={{
                display: "flex",
                alignItems: "center",
                gap: 14,
                flexWrap: "wrap",
                padding: "14px 18px",
                borderTop: i === 0 ? "none" : `1px solid ${BRAND.line}`,
                background: r.daysUntil <= 3 && !r.ready ? "#FFF8F7" : "transparent",
              }}
            >
              <div style={{ width: 108, flexShrink: 0 }}>
                <div style={{ fontSize: 14.5, fontWeight: 800, color: BRAND.primary }}>{fmtDate(r.nextDue)}</div>
                <div style={{ fontSize: 11.5, color: BRAND.inkSoft }}>{dueLabel(r)}</div>
              </div>
              <div style={{ flex: "1 1 220px", minWidth: 0 }}>
                <div style={{ fontSize: 14.5, fontWeight: 700, color: BRAND.ink }}>{r.audience.vertical}</div>
                <div style={{ fontSize: 12, color: BRAND.inkSoft }}>{r.audience.region} · {cadenceLabel(r.audience.cadenceDays)}</div>
              </div>
              <div style={{ flexShrink: 0 }}>{statusChip(r)}</div>
              <div style={{ flexShrink: 0 }}>
                <Btn kind={r.ready ? "ghost" : "accent"} small onClick={() => onOpen(r.audience.id)}>
                  {r.ready ? "Open" : "Generate →"}
                </Btn>
              </div>
            </div>
          ))}
        </div>
      )}

// ---------- History board: everything that was sent ----------
function HistoryBoard({ audiences, onOpen }) {
  const [rows, setRows] = useState(null);
  const [failed, setFailed] = useState(false);

  useEffect(() => {
    let live = true;
    (async () => {
      try {
        let log = await loadSentLog();
        if (log === null) {
          // Log never built (e.g. emails were marked sent on the old version) — build it once
          // by scanning audiences in parallel, then save so future loads are a single read.
          const results = await Promise.all(
            audiences.map(async (a) => {
              const emails = await loadEmails(a.id);
              return emails
                .filter((e) => e.sentAt)
                .map((e) => ({
                  emailId: e.id,
                  audienceId: a.id,
                  vertical: a.vertical,
                  region: a.region,
                  subject: e.subject,
                  angle: e.angle,
                  sentAt: e.sentAt,
                }));
            })
          );
          log = results.flat();
          await saveSentLog(log);
        }
        log.sort((x, y) => y.sentAt - x.sentAt);
        if (live) setRows(log);
      } catch (e) {
        console.error("history load failed", e);
        if (live) setFailed(true);
      }
    })();
    return () => (live = false);
  }, [audiences]);

  return (
    <div>
      <h2 style={{ margin: "0 0 4px", fontSize: 22, color: BRAND.ink }}>History</h2>
      <p style={{ margin: "0 0 20px", fontSize: 13.5, color: BRAND.inkSoft, maxWidth: 640, lineHeight: 1.55 }}>
        Everything the team has marked as sent, most recent first.

      {rows === null && !failed && <div style={{ fontSize: 13, color: BRAND.inkSoft }}>Loading history…</div>}

      {failed && (
        <div style={{ fontSize: 13.5, color: "#B3261E", background: BRAND.card, border: `1px solid ${BRAND.line}`, borderRadius: 12, padding: 20 }}>

      {rows !== null && rows.length > 0 && (
        <div style={{ background: BRAND.card, border: `1px solid ${BRAND.line}`, borderRadius: 14, overflow: "hidden" }}>

// ---------- Follow-ups board: contacts to work, by owner ----------
function FollowUpsBoard({ audiences, onOpen }) {
  const [crm, setCrm] = useState(null);
  const [ownerFilter, setOwnerFilter] = useState("__all");
  const [sortBy, setSortBy] = useState("date"); // date | interest

  useEffect(() => {
    let live = true;
    loadCrm().then((c) => live && setCrm(c));
    return () => (live = false);
  }, [audiences]);

  const saveContact = async (audienceId, updated) => {
    const fresh = await loadCrm();
    fresh[audienceId] = (fresh[audienceId] || []).map((c) => (c.id === updated.id ? updated : c));
    await saveCrm(fresh);
    setCrm(fresh);
  };

  const deleteContact = async (audienceId, id) => {
    const fresh = await loadCrm();
    fresh[audienceId] = (fresh[audienceId] || []).filter((c) => c.id !== id);
    await saveCrm(fresh);
    setCrm(fresh);
  };

  if (crm === null) {
    return <div style={{ fontSize: 13, color: BRAND.inkSoft }}>Loading follow-ups…</div>;
  }

  const audById = Object.fromEntries(audiences.map((a) => [a.id, a]));
  let rows = [];
  for (const [audienceId, contacts] of Object.entries(crm)) {
    const aud = audById[audienceId];
    if (!aud) continue;
    for (const c of contacts) rows.push({ audience: aud, contact: c });
  }

  const owners = [...new Set(audiences.map((a) => (a.owner || "").trim()).filter(Boolean))].sort();
  if (ownerFilter !== "__all") {
    rows = rows.filter((r) => (r.audience.owner || "").trim().toLowerCase() === ownerFilter.toLowerCase());
  }

  const today = startOfToday();
  rows.sort((x, y) => {
    if (sortBy === "interest") {
      return (y.contact.clicks || 0) - (x.contact.clicks || 0);
    }
    // date sort: overdue first, then soonest follow-up, contacts without a date last (by interest)
    const dx = x.contact.followUpDate ? parseDate(x.contact.followUpDate) : Infinity;
    const dy = y.contact.followUpDate ? parseDate(y.contact.followUpDate) : Infinity;
    if (dx !== dy) return dx - dy;
    return (y.contact.clicks || 0) - (x.contact.clicks || 0);
  });

  const dueCount = rows.filter((r) => r.contact.followUpDate && parseDate(r.contact.followUpDate) <= today).length;

  return (
    <div>
      <h2 style={{ margin: "0 0 4px", fontSize: 22, color: BRAND.ink }}>Follow-ups</h2>
      <p style={{ margin: "0 0 16px", fontSize: 13.5, color: BRAND.inkSoft, maxWidth: 640, lineHeight: 1.55 }}>
        Everyone who clicked through on a campaign, across all audiences. Interest is based on click count. {dueCount > 0 ? `${dueCount} follow-up${dueCount === 1 ? " is" : "s are"} due or overdue.` : ""}
      </p>

      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
        <Btn kind={ownerFilter === "__all" ? "primary" : "ghost"} small onClick={() => setOwnerFilter("__all")}>
          All owners
        </Btn>
        {owners.map((o) => (
          <Btn key={o} kind={ownerFilter.toLowerCase() === o.toLowerCase() ? "primary" : "ghost"} small onClick={() => setOwnerFilter(o)}>
            {o}
          </Btn>
        ))}
        {owners.length === 0 && (
          <span style={{ fontSize: 12.5, color: BRAND.inkSoft }}>
            No owners assigned yet — open an audience and set its owner to get a button for each team member here.
          </span>
        )}
      </div>
      <div style={{ display: "flex", gap: 6, alignItems: "center", marginBottom: 14 }}>
        <span style={{ fontSize: 12, color: BRAND.inkSoft }}>Sort by:</span>
        <Btn kind={sortBy === "date" ? "accent" : "ghost"} small onClick={() => setSortBy("date")}>Follow-up date</Btn>
        <Btn kind={sortBy === "interest" ? "accent" : "ghost"} small onClick={() => setSortBy("interest")}>Interest</Btn>
      </div>

      {rows.length === 0 && (
        <div style={{ fontSize: 13.5, color: BRAND.inkSoft, background: BRAND.card, border: `1px dashed ${BRAND.line}`, borderRadius: 12, padding: 20 }}>
          No contacts yet{ownerFilter !== "__all" ? " for this owner" : ""}. Open an audience and use "Import clicks" to bring in a click report — everyone who clicked will appear here.
        </div>
      )}

      {rows.length > 0 && (
        <div style={{ background: BRAND.card, border: `1px solid ${BRAND.line}`, borderRadius: 14, overflow: "hidden" }}>
          <div style={{ padding: "10px 16px", fontSize: 11.5, color: BRAND.inkSoft }}>
            {rows.length} contact{rows.length === 1 ? "" : "s"}
          </div>
          {rows.map((r) => (
            <ContactRow
              key={r.contact.id}
              contact={r.contact}
              extra={`${r.audience.vertical} — ${r.audience.region}${r.audience.owner ? " · " + r.audience.owner : ""}`}
              onSave={(updated) => saveContact(r.audience.id, updated)}
              onDelete={() => deleteContact(r.audience.id, r.contact.id)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// ---------- Data page: backup & restore ----------
function DataPage({ onRestored }) {
  const [status, setStatus] = useState("");
  const [busy, setBusy] = useState(false);
  const [phase, setPhase] = useState("idle"); // backup button: idle | working | done | error
  const [backupText, setBackupText] = useState("");
  const [copied, setCopied] = useState(false);
  const [restoreText, setRestoreText] = useState("");
  const [confirmRestore, setConfirmRestore] = useState(null); // parsed backup awaiting confirm
  const fileRef = useRef(null);

  const doBackup = async () => {
    if (phase === "working") return; // guard: no repeated clicks / simultaneous exports
    setPhase("working");
    setStatus("");
    setBackupText("");
    let url = null;
    try {
      // Time the whole export out instead of hanging forever if the stored-data bridge
      // never responds (the root cause of the stuck "Working…" state in the published app).
      const data = await withTimeout(exportAllData(), 20000, "Building the backup");
      const json = JSON.stringify(data, null, 2);
      setBackupText(json);

      // Trigger a real browser download via a Blob object URL.
      const blob = new Blob([json], { type: "application/json;charset=utf-8" });
      url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "enterpryze-campaign-studio-backup-" + new Date().toISOString().slice(0, 10) + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      // Revoke later, not immediately — revoking too early cancels the download in some browsers.
      setTimeout(() => { if (url) URL.revokeObjectURL(url); }, 2000);

      setPhase("done");
      setStatus(`Backup downloaded: ${data.audiences.length} audiences, ${Object.values(data.emails).flat().length} emails, ${Object.values(data.crm).flat().length} contacts, ${data.sentlog.length} sent records. If your browser blocked the download, use "Copy backup" below and paste it somewhere safe (a Word doc, Notepad, OneDrive…).`);
      setTimeout(() => setPhase((p) => (p === "done" ? "idle" : p)), 4000);
    } catch (e) {
      console.error("Backup download failed:", e);
      setPhase("error");
      setStatus("Backup failed: " + (e && e.message ? e.message : "unknown error") + ". Nothing was changed — your existing data is safe. Please try again.");
    }
  };

  const copyBackup = () => {
    const ta = document.createElement("textarea");
    ta.value = backupText;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    setCopied(true);
    setTimeout(() => setCopied(false), 1800);
  };

  const tryParse = (text) => {
    try {
      const data = JSON.parse(text);
      if (data.app !== BACKUP_MARKER || !Array.isArray(data.audiences)) throw new Error();
      setConfirmRestore(data);
      setStatus("");
      return true;
    } catch {
      setStatus("That doesn't look like a Campaign Studio backup.");
      return false;
    }
  };

  const onFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      tryParse(await file.text());
    } catch {
      setStatus("Couldn't read that file.");
    }
    e.target.value = "";
  };

  const doRestore = async () => {
    setBusy(true);
    setStatus("");
    try {
      await restoreFromBackup(confirmRestore);
      setStatus("Restore complete — all audiences, emails, contacts and history are back.");
      setConfirmRestore(null);
      setRestoreText("");
      onRestored();
    } catch (e) {
      console.error(e);
      setStatus("Restore failed: " + (e.message || "unknown error"));
    }
    setBusy(false);
  };

  return (
    <div style={{ maxWidth: 680 }}>
      <h2 style={{ margin: "0 0 4px", fontSize: 22, color: BRAND.ink }}>Data backup</h2>
      <p style={{ margin: "0 0 20px", fontSize: 13.5, color: BRAND.inkSoft, lineHeight: 1.6 }}>
        All audiences, emails, contacts, schedules and history are stored separately from the app, so publishing an upgrade never touches them. As an extra safety net, take a backup before any upgrade — it can be restored here at any time.
      </p>

      <div style={{ background: BRAND.card, border: `1px solid ${BRAND.line}`, borderRadius: 14, padding: 20, marginBottom: 14 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: BRAND.primary, marginBottom: 8 }}>Create a backup</div>
        <p style={{ margin: "0 0 12px", fontSize: 13, color: BRAND.inkSoft, lineHeight: 1.5 }}>
          Downloads a .json file with every audience, generated email, contact, note, schedule and the sent history. Keep it somewhere safe — you can restore it here at any time.
        </p>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <Btn onClick={doBackup} disabled={phase === "working"}>
            {phase === "working" ? "Preparing backup…" : phase === "done" ? "Backup downloaded ✓" : phase === "error" ? "Backup failed — try again" : "Download backup"}
          </Btn>
        </div>
      </div>

      <div style={{ background: BRAND.card, border: `1px solid ${BRAND.line}`, borderRadius: 14, padding: 20 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: BRAND.primary, marginBottom: 8 }}>Restore from a backup</div>
        <p style={{ margin: "0 0 12px", fontSize: 13, color: BRAND.inkSoft, lineHeight: 1.5 }}>
          Paste a backup below (or upload the file if you have one). Restoring replaces everything currently in the shared workspace for the whole team.
        </p>
        {confirmRestore ? (
          <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
            <span style={{ fontSize: 13, color: BRAND.ink }}>
              Backup from {new Date(confirmRestore.exportedAt).toLocaleDateString("en-IE", { day: "numeric", month: "short", year: "numeric" })} with {confirmRestore.audiences.length} audiences — replace current data?
            </span>
            <Btn kind="danger" small onClick={doRestore} disabled={busy}>Yes, restore</Btn>
            <Btn kind="ghost" small onClick={() => setConfirmRestore(null)}>Cancel</Btn>
          </div>
        ) : (
          <>
            <textarea
              placeholder="Paste your backup text here"
              value={restoreText}
              onChange={(e) => setRestoreText(e.target.value)}
              style={{ ...inputStyle, minHeight: 90, fontSize: 11, fontFamily: "monospace", resize: "vertical", marginBottom: 10 }}
            />
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <Btn onClick={() => tryParse(restoreText)} disabled={busy || !restoreText.trim()}>Restore from pasted text</Btn>
              <input ref={fileRef} type="file" accept=".json" onChange={onFile} style={{ display: "none" }} />
              <Btn kind="ghost" onClick={() => fileRef.current && fileRef.current.click()} disabled={busy}>Or choose a backup file</Btn>
            </div>
          </>
        )}
      </div>

      {status && <div style={{ marginTop: 14, fontSize: 13, fontWeight: 600, lineHeight: 1.5, color: status.includes("failed") || status.includes("doesn't") || status.includes("Couldn't") ? "#B3261E" : BRAND.primary }}>{status}</div>}
    </div>
  );
}

      }
      try {
        await seedDefaultAudiences();
      } catch (e) {
        console.error("seeding skipped", e);
      }
      try {
        await seedExampleContact();
      } catch (e) {
        console.error("example contact skipped", e);
      }
      const a = await loadAudiences();
      setAudiences(a);
      loaded.current = true;

                          )}
                        </div>
                        <div style={{ fontSize: 12.5, color: BRAND.inkSoft, marginTop: 4, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>
                          {a.description || "SME owners and operations leads"}
                        </div>
                        <div style={{ marginTop: 10, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                          <Chip color={BRAND.accent} bg="#FDE7F3">Generate email →</Chip>
                          {a.startDate && a.cadenceDays && (() => {
                            const s = computeSchedule(a, sentCounts[a.id] || 0);
                            return s ? <span style={{ fontSize: 11.5, color: s.overdue ? "#B3261E" : BRAND.inkSoft, fontWeight: s.overdue ? 700 : 400 }}>{s.overdue ? "Overdue: " : "Next send: "}{fmtDate(s.nextDue)}</span> : null;
                          })()}
                        </div>
                      </button>
                    ))}
                  </div>
                </div>
              ))
            )}
          </>
        )}

        {view.page === "board" && audiences !== null && (
          <PlanningBoard audiences={audiences} onOpen={(id) => setView({ page: "audience", id })} />
        )}

        {view.page === "history" && audiences !== null && (
          <HistoryBoard audiences={audiences} onOpen={(id) => setView({ page: "audience", id })} />
        )}

        {view.page === "followups" && audiences !== null && (
          <FollowUpsBoard audiences={audiences} onOpen={(id) => setView({ page: "audience", id })} />
        )}

        {view.page === "data" && (
          <DataPage
            onRestored={async () => {
              const a = await loadAudiences();
              setAudiences(a);
            }}
          />
        )}

        {view.page === "new" && audiences !== null && (
          <AudienceForm existing={audiences} onSave={addAudience} onCancel={() => setView({ page: "home" })} />
        )}

        {view.page === "audience" && selected && (
          <AudienceView
            audience={selected}
            onBack={() => setView({ page: "home" })}
            onDeleteAudience={() => deleteAudience(selected.id)}
            onUpdate={updateAudience}
          />
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
